<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Garage Tracker</title>

    <!-- favicon browser tab image -->
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">

    <!-- bootstrap via cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- our styles, after bootstrap so they win -->
    <link rel="stylesheet" href="css/vehicles.css" />

    <!-- page logic, deferred so the html is parsed first -->
    <script src="js/vehicles.js" defer></script>
  </head>

  <body>
    <header>
      <!-- navbar: brand left, page links right -->
      <nav class="navbar navbar-expand navbar-dark bg-dark">
        <div class="container">
          <a class="navbar-brand" href="index.html">Garage Tracker</a>

          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <!-- current page -->
              <a
                class="nav-link active"
                aria-current="page"
                href="vehicles.html"
                >Vehicles</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="services.html">Services</a>
            </li>
          </ul>
        </div>
      </nav>
    </header>

    <main class="container mt-4 mb-4">
      <!-- left = list + detail, right = add/edit form -->
      <div class="row">
        <!-- ===================== LEFT COLUMN ===================== -->
        <div class="col-md-8">
          <!-- vehicle list with filters on top -->
          <section class="border rounded p-3 mb-4">
            <h1>Your Garage</h1>

            <p>Search and filter the vehicles in your garage.</p>
            <!-- filters act on the list below (wired in js) -->
            <form id="filter-form" class="row g-2 mb-3 align-items-end">
              <div class="col-md-4">
                <label for="filter-q" class="form-label">Search</label>
                <input
                  id="filter-q"
                  class="form-control"
                  placeholder="Nickname, make, or model"
                />
              </div>

              <div class="col-md-3">
                <label for="filter-status" class="form-label">Status</label>
                <select id="filter-status" class="form-select">
                  <option value="">All statuses</option>
                  <option value="Active">Active</option>
                  <option value="In Repair">In Repair</option>
                  <option value="Garaged">Garaged</option>
                  <option value="Sold">Sold</option>
                </select>
              </div>

              <div class="col-md-3">
                <label for="filter-make" class="form-label">Make</label>
                <!-- make suggestions are filled by js from the data -->
                <input
                  id="filter-make"
                  class="form-control"
                  list="make-options"
                  placeholder="All makes"
                />
                <datalist id="make-options"></datalist>
              </div>

              <div class="col-md-2">
                <label for="filter-year" class="form-label">Year</label>
                <input
                  id="filter-year"
                  type="number"
                  class="form-control"
                  placeholder="Any"
                />
              </div>

              <div class="col-12">
                <button type="submit" class="btn btn-primary">Apply</button>
                <button
                  type="button"
                  id="filter-reset"
                  class="btn btn-secondary"
                >
                  Reset
                </button>
              </div>
            </form>

            <!-- count line, updated by js -->
            <p id="vehicle-count" class="text-muted small mb-1"></p>

            <!-- rows go in tbody via js; scroll-table caps height + pins header -->
            <div class="table-responsive scroll-table">
              <table class="table table-striped align-middle">
                <thead>
                  <tr>
                    <th>Vehicle</th>
                    <th>Year</th>
                    <th>Mileage</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="vehicles-tbody">
                  <tr>
                    <td>Loading…</td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>

          <!-- detail view: filled when a row's "view" is clicked -->
          <section class="border rounded p-3 mb-4">
            <h2>Vehicle Details</h2>
            <p id="detail-empty" class="text-muted">
              Select a vehicle above to see its details.
            </p>

            <!-- hidden until a vehicle is picked (js toggles d-none) -->
            <div id="detail-body" class="d-none">
              <dl class="row mb-3">
                <dt class="col-sm-3">Nickname</dt>
                <dd class="col-sm-9" id="detail-nickname"></dd>
                <dt class="col-sm-3">Make &amp; model</dt>
                <dd class="col-sm-9" id="detail-makemodel"></dd>
                <dt class="col-sm-3">Year</dt>
                <dd class="col-sm-9" id="detail-year"></dd>
                <dt class="col-sm-3">Mileage</dt>
                <dd class="col-sm-9" id="detail-mileage"></dd>
                <dt class="col-sm-3">Purchase price</dt>
                <dd class="col-sm-9" id="detail-price"></dd>
                <dt class="col-sm-3">Status</dt>
                <dd class="col-sm-9" id="detail-status"></dd>
              </dl>

              <!-- own little form so it doesn't submit the big add/edit form -->
              <form id="mileage-form" class="row g-2 align-items-end mb-3">
                <div class="col-auto">
                  <label for="mileage-input" class="form-label"
                    >Update mileage</label
                  >
                  <input
                    id="mileage-input"
                    type="number"
                    class="form-control"
                  />
                </div>
                <div class="col-auto">
                  <button type="submit" class="btn btn-outline-primary">
                    Save mileage
                  </button>
                </div>
              </form>

              <button type="button" id="detail-edit" class="btn btn-primary">
                Edit this vehicle
              </button>
              <button type="button" id="detail-delete" class="btn btn-danger">
                Delete
              </button>

              <p id="detail-message" class="mt-2"></p>
            </div>
          </section>
        </div>

        <!-- ===================== RIGHT COLUMN (sidebar) ===================== -->
        <div class="col-md-4">
          <!-- one form does add + edit: empty = add (post), filled = update (put) -->
          <section class="border rounded p-3">
            <!-- heading swapped by js between add/edit -->
            <h2 id="form-heading">Add a Vehicle</h2>
            <form id="vehicle-form">
              <div class="mb-3">
                <label for="form-nickname" class="form-label">Nickname</label>
                <input id="form-nickname" type="text" class="form-control" />
              </div>

              <div class="mb-3">
                <label for="form-make" class="form-label">Make</label>
                <input id="form-make" type="text" class="form-control" />
              </div>

              <div class="mb-3">
                <label for="form-model" class="form-label">Model</label>
                <input id="form-model" type="text" class="form-control" />
              </div>

              <div class="mb-3">
                <label for="form-year" class="form-label">Year</label>
                <input id="form-year" type="number" class="form-control" />
              </div>

              <div class="mb-3">
                <label for="form-mileage" class="form-label"
                  >Current Mileage</label
                >
                <input id="form-mileage" type="number" class="form-control" />
              </div>

              <div class="mb-3">
                <label for="form-price" class="form-label"
                  >Purchase Price</label
                >
                <input
                  id="form-price"
                  type="number"
                  step="0.01"
                  class="form-control"
                />
              </div>

              <div class="mb-3">
                <label for="form-status" class="form-label">Status</label>
                <select id="form-status" class="form-select">
                  <option value="">Select a status…</option>
                  <option value="Active">Active</option>
                  <option value="In Repair">In Repair</option>
                  <option value="Garaged">Garaged</option>
                  <option value="Sold">Sold</option>
                </select>
              </div>

              <!-- submit text swapped by js: save (add) / update (edit) -->
              <button type="submit" id="form-submit" class="btn btn-primary">
                Save
              </button>
              <!-- only shown in edit mode; clears form back to add -->
              <button
                type="button"
                id="form-cancel"
                class="btn btn-secondary d-none"
              >
                Cancel
              </button>

              <!-- shared error line (front-end gate or backend 400) -->
              <p id="form-error" class="text-danger mt-2"></p>
            </form>
          </section>
        </div>
      </div>
    </main>
  </body>
</html>
